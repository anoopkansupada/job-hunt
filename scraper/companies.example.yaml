# companies.yaml -- bulk company list for ATS resolution
#
# Just add name + domain. The resolver will find career pages
# and detect which ATS platform they use (Greenhouse, Lever, Ashby, etc.)
#
# Usage:
#   python3 run.py --import-companies companies.yaml
#   python3 run.py --resolve                   # detect ATS for all unresolved
#   python3 run.py --resolve --company "Stripe" # resolve one company
#   python3 run.py --stage discover             # scrape using detected ATS
#
# You can also pre-fill ats_platform + ats_slug if you already know them.

companies:
